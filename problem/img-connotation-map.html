<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>* { margin:0;padding:0;box-sizing:border-box; } body { background:#faf9f7;display:flex;align-items:center;justify-content:center;padding:1.5rem; }</style>
</head><body>
<svg viewBox="0 0 560 220" style="max-width:560px;width:100%">
  <!-- Map rectangle -->
  <rect x="80" y="60" width="400" height="130" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <!-- Inner box (concept cell) -->
  <rect x="80" y="60" width="120" height="80" fill="none" stroke="#ccc" stroke-width="1.5"/>

  <!-- Thumbs down emoji + arrow -->
  <text font-size="28" x="118" y="42" text-anchor="middle">👎</text>
  <line x1="118" y1="44" x2="118" y2="68" stroke="#aaa" stroke-width="1"/>
  <polygon points="118,72 114,64 122,64" fill="#aaa"/>

  <!-- Thumbs up emoji + arrow -->
  <text font-size="28" x="178" y="42" text-anchor="middle">👍</text>
  <line x1="178" y1="44" x2="155" y2="68" stroke="#aaa" stroke-width="1"/>
  <polygon points="153,72 150,63 158,65" fill="#aaa"/>

  <!-- Map label -->
  <text font-family="Georgia,serif" font-size="13" fill="#888" font-weight="500" x="280" y="210" text-anchor="middle">Map</text>
</svg>
</body></html>
