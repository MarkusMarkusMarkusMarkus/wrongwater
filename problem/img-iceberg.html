<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>* { margin:0;padding:0;box-sizing:border-box; } body { background:#faf9f7;display:flex;align-items:center;justify-content:center;padding:1.5rem; }</style>
</head><body>
<svg viewBox="0 0 560 280" style="max-width:560px;width:100%">
  <!-- Water line -->
  <line x1="40" y1="110" x2="520" y2="110" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Triangle (iceberg shape) -->
  <!-- tip above water -->
  <polygon points="280,20 240,110 320,110" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <!-- bulk below water -->
  <polygon points="280,20 160,260 400,260" fill="none" stroke="#ddd" stroke-width="1.5"/>

  <!-- Labels -->
  <text font-family="Georgia,serif" font-size="12" fill="#aaa" x="80" y="80" text-anchor="start">map is not the territory</text>
  <line x1="210" y1="75" x2="270" y2="65" stroke="#ccc" stroke-width="0.8"/>

  <text font-family="Georgia,serif" font-size="13" fill="#888" font-weight="500" x="280" y="90" text-anchor="middle">material reality</text>

  <text font-family="Georgia,serif" font-size="12" fill="#ccc" x="80" y="190" text-anchor="start">map is the territory</text>
  <line x1="190" y1="190" x2="250" y2="190" stroke="#ccc" stroke-width="0.8"/>

  <text font-family="Georgia,serif" font-size="14" fill="#aaa" font-weight="500" x="280" y="200" text-anchor="middle">social reality</text>
</svg>
</body></html>
