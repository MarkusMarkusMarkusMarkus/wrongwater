<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>* { margin:0;padding:0;box-sizing:border-box; } body { background:#faf9f7;display:flex;align-items:center;justify-content:center;padding:0 1.5rem 1rem; }</style>
</head><body>
<svg viewBox="0 0 560 220" style="max-width:560px;width:100%">

  <!-- Tower — stacked receding tiers -->
  <!-- Base -->
  <rect x="190" y="168" width="180" height="22" rx="1" fill="none" stroke="#bbb" stroke-width="1.2"/>
  <!-- Tier 2 -->
  <rect x="208" y="146" width="144" height="24" rx="1" fill="none" stroke="#bbb" stroke-width="1.1"/>
  <!-- Tier 3 -->
  <rect x="224" y="126" width="112" height="22" rx="1" fill="none" stroke="#bbb" stroke-width="1"/>
  <!-- Tier 4 -->
  <rect x="238" y="108" width="84" height="20" rx="1" fill="none" stroke="#bbb" stroke-width="0.9"/>
  <!-- Tier 5 -->
  <rect x="250" y="92" width="60" height="18" rx="1" fill="none" stroke="#ccc" stroke-width="0.8"/>
  <!-- Tier 6 -->
  <rect x="260" y="78" width="40" height="16" rx="1" fill="none" stroke="#ccc" stroke-width="0.7"/>
  <!-- Tip -->
  <polygon points="280,58 268,78 292,78" fill="none" stroke="#ddd" stroke-width="0.8"/>

  <!-- Ground line -->
  <line x1="120" y1="190" x2="440" y2="190" stroke="#e8e4de" stroke-width="1"/>

  <!-- People below, speaking different things -->
  <text font-size="18" x="148" y="183" text-anchor="middle">👤</text>
  <text font-size="18" x="216" y="183" text-anchor="middle">👤</text>
  <text font-size="18" x="344" y="183" text-anchor="middle">👤</text>
  <text font-size="18" x="412" y="183" text-anchor="middle">👤</text>

  <!-- Speech bubbles with different words -->
  <text font-family="Georgia,serif" font-size="10" fill="#aaa" font-style="italic" x="148" y="162" text-anchor="middle">baum</text>
  <text font-family="Georgia,serif" font-size="10" fill="#aaa" font-style="italic" x="216" y="162" text-anchor="middle">arbre</text>
  <text font-family="Georgia,serif" font-size="10" fill="#aaa" font-style="italic" x="344" y="162" text-anchor="middle">árbol</text>
  <text font-family="Georgia,serif" font-size="10" fill="#aaa" font-style="italic" x="412" y="162" text-anchor="middle">tree</text>

  <!-- Dotted lines from people up toward tower, diverging -->
  <line x1="148" y1="155" x2="210" y2="108" stroke="#e0dbd4" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="216" y1="155" x2="240" y2="108" stroke="#e0dbd4" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="344" y1="155" x2="320" y2="108" stroke="#e0dbd4" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="412" y1="155" x2="350" y2="108" stroke="#e0dbd4" stroke-width="0.7" stroke-dasharray="3,3"/>

  <!-- Caption -->
  <text font-family="Georgia,serif" font-size="11" fill="#ccc" x="280" y="212" text-anchor="middle">shared language makes shared maps possible</text>

</svg>
</body></html>
