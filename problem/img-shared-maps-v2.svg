  <line x1="48" y1="189" x2="88" y2="189" stroke="#ddd" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(221, 221, 221);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

