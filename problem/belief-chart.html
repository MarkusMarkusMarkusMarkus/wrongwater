<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belief & Existence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf9f7;
      font-family: 'EB Garamond', Georgia, serif;
      padding: 1.5rem 1.5rem 1rem;
    }

    .charts {
      display: flex;
      gap: 2.5rem;
      align-items: flex-start;
    }

    .chart-wrap {
      flex: 1;
      min-width: 0;
    }

    .chart-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      color: #555;
      margin-bottom: 0.15rem;
    }

    .chart-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.45rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 0.6rem;
    }

    canvas { display: block; width: 100%; }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-top: 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.45rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #aaa;
    }
    input[type=range] {
      flex: 1;
      accent-color: #999;
      height: 2px;
      cursor: pointer;
      outline: none;
    }
    .val { min-width: 28px; text-align: right; color: #888; }

    .status {
      margin-top: 0.45rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-height: 1.2em;
      color: #aaa;
    }

    .caption {
      font-style: italic;
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 1rem;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="charts">

    <div class="chart-wrap">
      <div class="chart-title">Material Reality</div>
      <canvas id="c1" width="260" height="160"></canvas>
      <div class="controls">
        <span>Belief</span>
        <input type="range" id="s1" min="0" max="100" value="30">
        <span class="val" id="v1">30%</span>
      </div>
      <div class="status" id="st1"></div>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">Social Reality</div>
      <canvas id="c2" width="260" height="160"></canvas>
      <div class="controls">
        <span>Belief</span>
        <input type="range" id="s2" min="0" max="100" value="70">
        <span class="val" id="v2">70%</span>
      </div>
      <div class="status" id="st2"></div>
    </div>

  </div>



  <script>
    const THRESHOLD = 50;
    const CREAM = '#faf9f7';
    const AXIS  = '#ddd';
    const GRID  = '#eee';
    const LABEL = '#bbb';
    const GREEN = '#1D9E75';
    const RED   = '#C0392B';
    const MARKER= '#D4A84B';

    function baseSetup(canvas) {
      const dpr = window.devicePixelRatio || 1;
      const displayW = canvas.clientWidth || canvas.width;
      const displayH = canvas.clientHeight || canvas.height;
      canvas.width  = displayW * dpr;
      canvas.height = displayH * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      return { ctx, W: displayW, H: displayH };
    }

    function drawAxes(ctx, pad, cw, ch) {
      // axes and x ticks only — y labels drawn per-chart at exact line heights

      // x ticks
      [0, 50, 100].forEach(v => {
        const x = pad.l + (v / 100) * cw;
        ctx.fillStyle = LABEL; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(v + '%', x, pad.t + ch + 13);
      });

      // axes
      ctx.strokeStyle = AXIS; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(pad.l, pad.t);
      ctx.lineTo(pad.l, pad.t + ch);
      ctx.lineTo(pad.l + cw, pad.t + ch);
      ctx.stroke();

      // x-axis label
      ctx.fillStyle = '#ccc'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('% believing →', pad.l + cw / 2, pad.t + ch + 25);
    }

    function drawMaterial(canvas, belief) {
      const { ctx, W, H } = baseSetup(canvas);
      ctx.fillStyle = CREAM; ctx.fillRect(0, 0, W, H);

      const pad = { t: 18, r: 16, b: 32, l: 68 };
      const cw = W - pad.l - pad.r;
      const ch = H - pad.t - pad.b;

      drawAxes(ctx, pad, cw, ch);

      const yHigh = pad.t + ch * 0.15;
      const yLow  = pad.t + ch; // x-axis baseline

      // flat line
      ctx.strokeStyle = GREEN; ctx.lineWidth = 1.8;
      ctx.beginPath(); ctx.moveTo(pad.l, yHigh); ctx.lineTo(pad.l + cw, yHigh); ctx.stroke();

      // y-axis labels at exact line heights
      ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
      ctx.fillStyle = LABEL;
      ctx.fillText('exists', pad.l - 5, yHigh + 3.5);
      ctx.fillText("doesn't exist", pad.l - 5, yLow + 3.5);

      // marker
      const bx = pad.l + (belief / 100) * cw;
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.8; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(bx, pad.t); ctx.lineTo(bx, pad.t + ch); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = MARKER;
      ctx.beginPath(); ctx.arc(bx, yHigh, 4, 0, Math.PI * 2); ctx.fill();
    }

    function drawSocial(canvas, belief) {
      const { ctx, W, H } = baseSetup(canvas);
      ctx.fillStyle = CREAM; ctx.fillRect(0, 0, W, H);

      const pad = { t: 18, r: 16, b: 32, l: 68 };
      const cw = W - pad.l - pad.r;
      const ch = H - pad.t - pad.b;
      const exists = belief >= THRESHOLD;

      drawAxes(ctx, pad, cw, ch);

      // threshold line
      const tx = pad.l + (THRESHOLD / 100) * cw;
      ctx.strokeStyle = '#e0ddd8'; ctx.lineWidth = 0.8; ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(tx, pad.t); ctx.lineTo(tx, pad.t + ch); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#ccc'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('threshold', tx, pad.t - 5);

      // step function
      const yHigh = pad.t + ch * 0.15;
      const yLow  = pad.t + ch; // sit on x-axis baseline
      ctx.strokeStyle = exists ? GREEN : RED;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(pad.l, yLow);
      ctx.lineTo(tx, yLow);
      ctx.moveTo(tx, yHigh);
      ctx.lineTo(pad.l + cw, yHigh);
      ctx.stroke();

      // dashed connector at threshold
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(tx, yLow); ctx.lineTo(tx, yHigh); ctx.stroke();
      ctx.setLineDash([]);

      // y-axis labels at exact line heights
      ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
      ctx.fillStyle = LABEL;
      ctx.fillText('exists', pad.l - 5, yHigh + 3.5);
      ctx.fillText("doesn't exist", pad.l - 5, yLow + 3.5);

      // marker
      const bx = pad.l + (belief / 100) * cw;
      const by = exists ? yHigh : yLow;
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.8; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(bx, pad.t); ctx.lineTo(bx, pad.t + ch); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = MARKER;
      ctx.beginPath(); ctx.arc(bx, by, 4, 0, Math.PI * 2); ctx.fill();
    }

    function update1() {
      const v = +document.getElementById('s1').value;
      document.getElementById('v1').textContent = v + '%';
      drawMaterial(document.getElementById('c1'), v);
      document.getElementById('st1').textContent = 'Exists — independent of belief';
      document.getElementById('st1').style.color = '#1D9E75';
    }

    function update2() {
      const v = +document.getElementById('s2').value;
      document.getElementById('v2').textContent = v + '%';
      drawSocial(document.getElementById('c2'), v);
      const exists = v >= THRESHOLD;
      document.getElementById('st2').textContent = exists
        ? 'Exists — belief above threshold'
        : 'Collapses — belief below 50%';
      document.getElementById('st2').style.color = exists ? '#1D9E75' : '#C0392B';
    }

    document.getElementById('s1').addEventListener('input', update1);
    document.getElementById('s2').addEventListener('input', update2);

    // redraw on resize for DPR correctness
    window.addEventListener('resize', () => { update1(); update2(); });

    update1(); update2();
  </script>
</body>
</html>
