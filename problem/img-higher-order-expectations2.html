<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  * { margin:0;padding:0;box-sizing:border-box; }
  body { background:#faf9f7;display:flex;align-items:center;justify-content:center;padding:1.5rem; }
</style>
</head><body>
<svg viewBox="0 0 560 180" style="max-width:560px;width:100%" font-family="Georgia,serif">

  <!-- Left column label -->
  <text font-size="9" fill="#ccc" x="130" y="16" text-anchor="middle" letter-spacing="0.07em">WHAT I THINK</text>

  <!-- Right column label -->
  <text font-size="9" fill="#aaa" x="430" y="16" text-anchor="middle" letter-spacing="0.07em">WHAT I ACT ON</text>

  <!-- ── Left side: first-order belief (faint) ── -->
  <rect x="50" y="30" width="160" height="34" rx="2" fill="none" stroke="#e0ddd8" stroke-width="0.9"/>
  <text font-size="11" fill="#ccc" x="130" y="51" text-anchor="middle">my own belief</text>

  <rect x="50" y="80" width="160" height="34" rx="2" fill="none" stroke="#ddd" stroke-width="0.9"/>
  <text font-size="11" fill="#bbb" x="130" y="101" text-anchor="middle">what I think others think</text>

  <rect x="50" y="130" width="160" height="34" rx="2" fill="none" stroke="#ddd" stroke-width="0.9"/>
  <text font-size="11" fill="#bbb" x="130" y="151" text-anchor="middle">what I expect others to do</text>

  <!-- row labels -->
  <text font-size="8.5" fill="#ddd" x="44" y="50" text-anchor="end">1st order</text>
  <text font-size="8.5" fill="#c8c0b8" x="44" y="100" text-anchor="end">2nd order</text>
  <text font-size="8.5" fill="#c8c0b8" x="44" y="150" text-anchor="end">3rd order</text>

  <!-- ── Arrows to right side ── -->
  <!-- 1st order → faint, thin -->
  <line x1="210" y1="47" x2="338" y2="80" stroke="#e8e4de" stroke-width="0.8" stroke-dasharray="4,4"/>
  <polygon points="334,77 342,83 337,87" fill="#e8e4de"/>

  <!-- 2nd order → medium -->
  <line x1="210" y1="97" x2="338" y2="97" stroke="#c0cfdc" stroke-width="1.3" stroke-dasharray="5,3"/>
  <polygon points="334,93 344,97 334,101" fill="#c0cfdc"/>

  <!-- 3rd order → strongest -->
  <line x1="210" y1="147" x2="338" y2="114" stroke="#9ab4c8" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="334,108 344,115 336,120" fill="#9ab4c8"/>

  <!-- ── Right side: action box ── -->
  <rect x="342" y="72" width="172" height="50" rx="2" fill="#eaeeea" stroke="#c4d4c4" stroke-width="1"/>
  <text font-size="13" fill="#5a7a5a" x="428" y="97" text-anchor="middle" font-style="italic">action</text>
  <text font-size="9" fill="#9ab89a" x="428" y="113" text-anchor="middle">shaped mostly by 2nd &amp; 3rd order</text>

  <!-- ── Caption ── -->
  <text font-size="10.5" fill="#bbb" x="280" y="170" text-anchor="middle" font-style="italic">It is not what you believe, but what you believe others believe, that moves you.</text>

</svg>
</body></html>
