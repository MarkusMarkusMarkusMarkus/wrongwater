<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>* { margin:0;padding:0;box-sizing:border-box; } body { background:#faf9f7;display:flex;align-items:center;justify-content:center;padding:1.5rem; }</style>
</head><body>
<svg viewBox="0 0 320 340" style="max-width:280px;width:100%" font-family="Georgia,serif">

  <!-- Reality label -->
  <text font-size="13" fill="#666" x="160" y="28" text-anchor="middle">Reality</text>

  <!-- Left semicircle: Material Reality (flat side right) -->
  <path d="M 160,50 A 120,120 0 0 0 160,290 Z" fill="#d6e8f5" stroke="#aac4d8" stroke-width="1"/>

  <!-- Right semicircle: Social Reality (flat side left) -->
  <path d="M 160,50 A 120,120 0 0 1 160,290 Z" fill="#d6e8f5" stroke="#aac4d8" stroke-width="1"/>

  <!-- Centre dividing line -->
  <line x1="160" y1="50" x2="160" y2="290" stroke="#faf9f7" stroke-width="2"/>

  <!-- Labels -->
  <text font-size="13" fill="#555" x="88" y="165" text-anchor="middle">Material</text>
  <text font-size="13" fill="#555" x="88" y="182" text-anchor="middle">Reality</text>

  <text font-size="13" fill="#555" x="232" y="165" text-anchor="middle">Social</text>
  <text font-size="13" fill="#555" x="232" y="182" text-anchor="middle">Reality</text>

</svg>
</body></html>
