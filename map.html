<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — Wrongwater</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #faf9f7; font-family: 'EB Garamond', Georgia, serif; }

    nav {
      position: fixed; top: 0; left: 0; width: 136px; height: 100vh;
      padding: 2.8rem 0 2.8rem 1.8rem;
      display: flex; flex-direction: column; gap: 0.05rem;
      z-index: 10; background: #faf9f7;
    }
    .nav-item {
      font-family: 'JetBrains Mono', monospace; font-size: 0.53rem;
      letter-spacing: 0.06em; text-transform: uppercase; padding: 0.25rem 0;
      text-decoration: none; color: #ccc; pointer-events: none;
    }
    .nav-item.active { color: #222; pointer-events: auto; }

    canvas {
      position: fixed; top: 0; left: 136px;
      width: calc(100vw - 136px); height: 100vh;
      cursor: grab; display: block;
      touch-action: none;
    }

    #tip {
      position: fixed; pointer-events: none; opacity: 0;
      background: #fffff8; border: 1px solid #ddd; border-radius: 2px;
      padding: 12px 16px; width: 300px; z-index: 20;
      transition: opacity 0.15s;
    }
    #tip-label {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; margin-bottom: 5px;
    }
    #tip-title { font-size: 16px; font-weight: 500; color: #111; margin-bottom: 8px; line-height: 1.35; font-family: 'EB Garamond', Georgia, serif; }
    #tip-body { font-size: 15px; color: #444; line-height: 1.65; font-family: 'EB Garamond', Georgia, serif; }

    #back {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 20;
      font-family: 'JetBrains Mono', monospace; font-size: 0.48rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #ccc; text-decoration: none;
    }
    #back:hover { color: #222; }
    #instructions {
      position: fixed; bottom: 1.5rem; left: 152px; z-index: 20;
      font-family: 'JetBrains Mono', monospace; font-size: 0.45rem;
      letter-spacing: 0.06em; color: #ccc;
    }

    /* Mobile bottom sheet */
    #mobile-sheet {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      background: #fffff8; border-top: 1px solid #ddd;
      padding: 16px 20px 32px;
      transform: translateY(100%);
      transition: transform 0.22s ease;
    }
    #mobile-sheet.visible { transform: translateY(0); }
    #mobile-sheet-label {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; margin-bottom: 5px;
    }
    #mobile-sheet-title { font-size: 18px; font-weight: 500; color: #111; margin-bottom: 8px; line-height: 1.35; }
    #mobile-sheet-body { font-size: 16px; color: #444; line-height: 1.65; margin-bottom: 14px; }
    #mobile-sheet-link {
      font-family: 'JetBrains Mono', monospace; font-size: 0.5rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #222; text-decoration: none; border-bottom: 1px solid #ccc; padding-bottom: 1px;
    }
    #mobile-sheet-close {
      position: absolute; top: 14px; right: 16px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.45rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #bbb; background: none; border: none; cursor: pointer; padding: 4px;
    }

    @media (max-width: 600px) {
      nav {
        width: 100%; height: 40px;
        flex-direction: row; gap: 1.2rem;
        padding: 0 1.2rem;
        align-items: center;
        border-bottom: 1px solid #eee;
        position: fixed; top: 0; left: 0;
      }
      canvas { left: 0; width: 100vw; top: 40px; height: calc(100vh - 40px); }
      #instructions { left: 1rem; bottom: 1rem; }
      #back { display: none; }
      #tip { display: none; }
      #mobile-sheet { display: block; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-item active" href="/">Problem</a>
    <a class="nav-item">Solution (Upcoming)</a>
  </nav>
  <canvas id="c"></canvas>
  <div id="tip">
    <div id="tip-label"></div>
    <div id="tip-title"></div>
    <div id="tip-body"></div>
  </div>
  <div id="mobile-sheet">
    <button id="mobile-sheet-close">close</button>
    <div id="mobile-sheet-label"></div>
    <div id="mobile-sheet-title"></div>
    <div id="mobile-sheet-body"></div>
    <a id="mobile-sheet-link" href="#">visit →</a>
  </div>
  <div id="instructions">drag · scroll to zoom · click to visit</div>
  <a id="back" href="/">back</a>

  <script>
  const NODES = [
    {id:'index',label:'Problem',color:'#7F77DD',x:0,y:0,r:18},
    {id:'public-language',label:'Public Language',color:'#1D9E75',x:-180,y:-80,r:14},
    {id:'engineered-language',label:'Engineered Language',color:'#D85A30',x:120,y:-120,r:14},
    {id:'political-struggle',label:'Political Struggle',color:'#D4537E',x:-60,y:140,r:14},
    {id:'shared-maps',label:'Shared Maps',color:'#378ADD',x:160,y:80,r:16},
    {id:'social-reality',label:'Social Reality',color:'#BA7517',x:-160,y:120,r:14},
    {id:'engineered-names',label:'Engineered Names',color:'#D85A30',x:60,y:-220,r:11},
    {id:'engineered-words',label:'Engineered Words',color:'#D85A30',x:240,y:-180,r:11},
    {id:'denotation-connotation',label:'Denotation vs Connotation',color:'#D85A30',x:340,y:-240,r:9},
    {id:'engineered-concepts',label:'Engineered Concepts',color:'#D85A30',x:180,y:-60,r:11},
    {id:'legitimacy',label:'Legitimacy & Authority',color:'#BA7517',x:-280,y:80,r:11},
    {id:'interlocking-expectations',label:'Interlocking Expectations',color:'#BA7517',x:-300,y:200,r:11},
    {id:'map-territory',label:'Map & Territory',color:'#378ADD',x:300,y:140,r:11},
    {id:'concepts',label:'Concepts',color:'#378ADD',x:280,y:40,r:11},
    {id:'material-social',label:'Material vs Social Reality',color:'#378ADD',x:380,y:220,r:11},
    {id:'map-is-territory',label:'The Map is the Territory',color:'#378ADD',x:200,y:220,r:11},
  ];
  const EDGES = [
    ['index','public-language'],['index','engineered-language'],
    ['index','political-struggle'],['index','shared-maps'],['index','social-reality'],
    ['public-language','shared-maps'],['public-language','engineered-language'],
    ['engineered-language','engineered-names'],['engineered-language','engineered-words'],
    ['engineered-language','engineered-concepts'],
    ['engineered-words','denotation-connotation'],
    ['engineered-concepts','concepts'],['engineered-concepts','engineered-names'],['engineered-concepts','engineered-words'],
    ['political-struggle','shared-maps'],['political-struggle','social-reality'],
    ['social-reality','shared-maps'],['social-reality','legitimacy'],
    ['legitimacy','interlocking-expectations'],
    ['interlocking-expectations','political-struggle'],['interlocking-expectations','social-reality'],
    ['shared-maps','concepts'],['shared-maps','public-language'],['shared-maps','map-territory'],
    ['map-territory','concepts'],['map-territory','material-social'],['map-territory','map-is-territory'],
    ['material-social','shared-maps'],['material-social','map-is-territory'],
    ['map-is-territory','social-reality'],['map-is-territory','public-language'],
    ['concepts','shared-maps'],['concepts','engineered-concepts'],
  ];
  const PAGES = {
    'index':{label:'Problem',title:'Good private reasoning is difficult.',body:'Private thought relies on public language, and public language has been shaped by political struggle over the shared maps that organize social reality.'},
    'public-language':{label:'Public Language',title:'Most of the language you use, you did not invent.',body:'Words are socially evolved tools for coordination and persuasion — reused inside our minds as instruments of thought.'},
    'engineered-language':{label:'Engineered Language',title:'Sometimes the word comes before the thing.',body:'Language can be deliberately created or spread to shape how patterns are perceived — by relabeling, recoloring, or redrawing the map.'},
    'engineered-names':{label:'Engineered Names',title:'The name leads your mind along a path of least resistance.',body:'Is OpenAI open? The label creates the illusion of knowledge.'},
    'engineered-words':{label:'Engineered Words',title:'You do not always need to change what people look at.',body:'"He is firm." "He is obstinate." "He is pig-headed." Same trait, different evaluative coloring.'},
    'denotation-connotation':{label:'Denotation vs Connotation',title:'Words point and suggest.',body:'Denotation is what a word refers to. Connotation is the halo of feelings and judgments that gather around it.'},
    'engineered-concepts':{label:'Engineered Concepts',title:'Engineered concepts reorganize reality in advance.',body:'"Microaggression" extends the force of aggression to smaller acts. Part of the conclusion is smuggled into the term itself.'},
    'political-struggle':{label:'Political Struggle',title:'Political struggle can be carried out through language.',body:'Struggle extends into conflict over the shared maps through which social reality is interpreted.'},
    'social-reality':{label:'Social Reality',title:'Social reality determines what people treat as real.',body:'Shared maps determine who counts as a ruler, who commands the army, who gets obeyed.'},
    'legitimacy':{label:'Legitimacy & Authority',title:'Legitimacy is a social equilibrium.',body:'What holds the system together is often not conviction but the expectation of others\' conviction.'},
    'interlocking-expectations':{label:'Interlocking Expectations',title:'Social orders decay slowly but collapse quickly.',body:'First-order belief weakens quietly. Public behavior continues because everyone expects everyone else to go along. Then it tips.'},
    'shared-maps':{label:'Shared Maps',title:'Social life depends on overlapping maps.',body:'Shared maps are mental maps that overlap enough across sufficient people to make communication and coordination possible.'},
    'map-territory':{label:'Map & Territory',title:'The map is not the territory — except when it is.',body:'In material reality, the map is not the territory. In social reality, the shared map is the territory.'},
    'concepts':{label:'Concepts',title:'Concepts determine what we see.',body:'The rabbit-duck illusion: the image never changes, only the concept you apply to it changes.'},
    'material-social':{label:'Material vs Social Reality',title:'Material reality does not go away when you stop believing in it.',body:'Social reality is the opposite — money, laws, borders exist only insofar as enough people treat them as real.'},
    'map-is-territory':{label:'The Map is the Territory',title:'In social reality, shared maps constitute the territory.',body:'Maps do not merely describe the world — they are how the world gets made.'},
  };

  const isMobile = () => window.innerWidth <= 600;
  const NAV_OFFSET = () => isMobile() ? 0 : 136;
  const TOP_OFFSET = () => isMobile() ? 40 : 0;

  const canvas = document.getElementById('c');
  const tip = document.getElementById('tip');
  const sheet = document.getElementById('mobile-sheet');
  const dpr = window.devicePixelRatio || 1;
  let W, H, ctx;
  let pan = {x: 0, y: 0};
  let zoom = 1;
  let dragging = false, lastMouse = null, hovered = null;
  let touches = [], lastPinchDist = null, tapStart = null;

  function getCanvasSize() {
    W = window.innerWidth - NAV_OFFSET();
    H = window.innerHeight - TOP_OFFSET();
  }

  function initCanvas() {
    getCanvasSize();
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    pan = {x: W/2, y: H/2};
    if (isMobile()) zoom = 0.55;
  }

  function getRead() {
    try { return new Set(JSON.parse(localStorage.getItem('ww_read') || '[]')); } catch(e) { return new Set(); }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#faf9f7';
    ctx.fillRect(0, 0, W, H);

    const read = getRead();

    EDGES.forEach(([a,b]) => {
      const na = NODES.find(n => n.id===a), nb = NODES.find(n => n.id===b);
      if (!na || !nb) return;
      const sx = na.x*zoom + pan.x, sy = na.y*zoom + pan.y;
      const ex = nb.x*zoom + pan.x, ey = nb.y*zoom + pan.y;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
      const isActive = hovered && (hovered.id===a || hovered.id===b);
      ctx.strokeStyle = isActive ? 'rgba(50,50,40,0.6)' : 'rgba(80,80,70,0.3)';
      ctx.lineWidth = isActive ? 1.5 : 0.8;
      ctx.stroke();
    });

    NODES.forEach(n => {
      const sx = n.x*zoom + pan.x, sy = n.y*zoom + pan.y;
      const r = n.r * zoom;
      const isHov = hovered && hovered.id === n.id;
      const isRead = n.id === 'index' || read.has(n.id);
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
      ctx.globalAlpha = isHov ? 1 : 0.85;
      if (isRead) {
        ctx.fillStyle = n.color;
        ctx.fill();
      } else {
        ctx.fillStyle = '#faf9f7';
        ctx.fill();
        ctx.strokeStyle = n.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      if (zoom > 0.4 || isHov) {
        const fs = Math.max(9, Math.min(13, 11*zoom));
        ctx.font = `${isHov ? 500 : 400} ${fs}px sans-serif`;
        ctx.fillStyle = '#111'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.globalAlpha = isHov ? 1 : Math.min(1, zoom * 1.5);
        const words = n.label.split(' '), lh = fs * 1.3;
        let lines = [], cur = '';
        words.forEach(w => {
          const test = cur ? cur + ' ' + w : w;
          if (ctx.measureText(test).width > 85*zoom && cur) { lines.push(cur); cur = w; }
          else cur = test;
        });
        lines.push(cur);
        lines.forEach((line, i) => { ctx.fillText(line, sx, sy + r + 5 + i*lh); });
        ctx.globalAlpha = 1;
      }
    });
  }

  function getHovered(mx, my) {
    const wx = (mx - pan.x) / zoom, wy = (my - pan.y) / zoom;
    const hitMult = isMobile() ? 2.5 : 1.8;
    return NODES.find(n => {
      const dx = n.x - wx, dy = n.y - wy;
      return Math.sqrt(dx*dx + dy*dy) < n.r * hitMult;
    }) || null;
  }

  function showSheet(node) {
    if (!node) return;
    const d = PAGES[node.id]; if (!d) return;
    document.getElementById('mobile-sheet-label').textContent = d.label;
    document.getElementById('mobile-sheet-title').textContent = d.title;
    document.getElementById('mobile-sheet-body').textContent = d.body;
    const link = document.getElementById('mobile-sheet-link');
    link.href = node.id === 'index' ? '/' : 'problem/' + node.id + '.html';
    sheet.classList.add('visible');
  }
  function hideSheet() { sheet.classList.remove('visible'); }

  // Mouse
  canvas.addEventListener('mousemove', e => {
    const mx = e.clientX - NAV_OFFSET(), my = e.clientY - TOP_OFFSET();
    if (dragging && lastMouse) {
      pan.x += mx - lastMouse.x; pan.y += my - lastMouse.y;
      lastMouse = {x: mx, y: my}; draw(); return;
    }
    const h = getHovered(mx, my);
    if (h !== hovered) { hovered = h; draw(); }
    if (h) {
      canvas.style.cursor = 'pointer';
      const d = PAGES[h.id];
      if (d) {
        document.getElementById('tip-label').textContent = d.label;
        document.getElementById('tip-title').textContent = d.title;
        document.getElementById('tip-body').textContent = d.body;
      }
      tip.style.opacity = '1';
      const tipW = 300, tx = e.clientX + 16, ty = Math.max(10, e.clientY - 80);
      tip.style.left = (tx + tipW > window.innerWidth ? e.clientX - tipW - 16 : tx) + 'px';
      tip.style.top = ty + 'px';
    } else {
      canvas.style.cursor = dragging ? 'grabbing' : 'grab';
      tip.style.opacity = '0';
    }
  });

  canvas.addEventListener('mousedown', e => {
    dragging = true;
    lastMouse = {x: e.clientX - NAV_OFFSET(), y: e.clientY - TOP_OFFSET()};
    canvas.style.cursor = 'grabbing';
  });

  canvas.addEventListener('mouseup', e => {
    const mx = e.clientX - NAV_OFFSET(), my = e.clientY - TOP_OFFSET();
    if (lastMouse && Math.abs(mx - lastMouse.x) < 4 && Math.abs(my - lastMouse.y) < 4) {
      const h = getHovered(mx, my);
      if (h) {
        const url = h.id === 'index' ? '/' : 'problem/' + h.id + '.html';
        if (e.metaKey || e.ctrlKey) window.open(url, '_blank');
        else window.location.href = url;
      }
    }
    dragging = false; lastMouse = null; canvas.style.cursor = 'grab';
  });

  canvas.addEventListener('mouseleave', () => {
    dragging = false; hovered = null; tip.style.opacity = '0'; draw();
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const mx = e.clientX - NAV_OFFSET(), my = e.clientY - TOP_OFFSET();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const nz = Math.max(0.3, Math.min(3, zoom * delta));
    pan.x = mx - (mx - pan.x) * (nz / zoom);
    pan.y = my - (my - pan.y) * (nz / zoom);
    zoom = nz; draw();
  }, {passive: false});

  // Touch
  function getTouchPos(t) {
    const r = canvas.getBoundingClientRect();
    return {x: t.clientX - r.left, y: t.clientY - r.top};
  }
  function pinchDist(t1, t2) {
    const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  function pinchMid(t1, t2) {
    const r = canvas.getBoundingClientRect();
    return {x: (t1.clientX + t2.clientX)/2 - r.left, y: (t1.clientY + t2.clientY)/2 - r.top};
  }

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touches = Array.from(e.touches);
    if (touches.length === 1) {
      const p = getTouchPos(touches[0]);
      tapStart = {x: p.x, y: p.y, time: Date.now()};
      lastMouse = p; dragging = true;
    } else if (touches.length === 2) {
      lastPinchDist = pinchDist(touches[0], touches[1]);
      tapStart = null; dragging = false;
    }
  }, {passive: false});

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    touches = Array.from(e.touches);
    if (touches.length === 1 && dragging && lastMouse) {
      const p = getTouchPos(touches[0]);
      pan.x += p.x - lastMouse.x; pan.y += p.y - lastMouse.y;
      lastMouse = p;
      if (tapStart && (Math.abs(p.x - tapStart.x) > 8 || Math.abs(p.y - tapStart.y) > 8)) tapStart = null;
      draw();
    } else if (touches.length === 2 && lastPinchDist !== null) {
      const newDist = pinchDist(touches[0], touches[1]);
      const mid = pinchMid(touches[0], touches[1]);
      const nz = Math.max(0.2, Math.min(4, zoom * newDist / lastPinchDist));
      pan.x = mid.x - (mid.x - pan.x) * (nz / zoom);
      pan.y = mid.y - (mid.y - pan.y) * (nz / zoom);
      zoom = nz; lastPinchDist = newDist; draw();
    }
  }, {passive: false});

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const remaining = Array.from(e.touches);
    if (remaining.length === 0) {
      if (tapStart && Date.now() - tapStart.time < 300) {
        const h = getHovered(tapStart.x, tapStart.y);
        if (h) {
          if (isMobile()) { hovered = h; draw(); showSheet(h); }
          else window.location.href = h.id === 'index' ? '/' : 'problem/' + h.id + '.html';
        } else { hideSheet(); }
      }
      dragging = false; lastMouse = null; lastPinchDist = null; tapStart = null;
    } else if (remaining.length === 1) {
      lastPinchDist = null;
      lastMouse = getTouchPos(remaining[0]); dragging = true;
    }
    touches = remaining;
  }, {passive: false});

  document.getElementById('mobile-sheet-close').addEventListener('click', () => {
    hideSheet(); hovered = null; draw();
  });

  function updateInstructions() {
    document.getElementById('instructions').textContent =
      isMobile() ? 'drag · pinch to zoom · tap nodes' : 'drag · scroll to zoom · click to visit';
  }

  window.addEventListener('resize', () => {
    getCanvasSize();
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.scale(dpr, dpr);
    updateInstructions(); draw();
  });

  initCanvas();
  updateInstructions();
  draw();
  </script>
</body>
</html>
