<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrongwater</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --text: #1a1a1a;
      --text-muted: #999;
      --text-disabled: #ccc;
      --link: #1a4a8a;
      --link-hover: #0d2e5c;
      --underline: rgba(26, 74, 138, 0.35);
      --preview-bg: #fffff8;
      --preview-border: #ddd;
      --preview-shadow: rgba(0,0,0,0.11);
    }

    html { font-size: 20px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      line-height: 1.7;
      min-height: 100vh;
    }

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 4rem 2rem;
    }

    .top-nav {
      position: fixed;
      top: 2rem;
      right: 2rem;
      display: flex;
      gap: 1.6rem;
      z-index: 50;
    }

    .top-nav-item {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text);
    }
    .top-nav-item:hover { color: var(--link); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    .content { max-width: 560px; width: 100%; }

    .thesis-lead {
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.5;
      margin-bottom: 1.4rem;
    }

    .thesis-body { font-size: 1.1rem; line-height: 1.8; }

    .tlink {
      color: var(--link);
      text-decoration: underline;
      text-decoration-color: var(--underline);
      text-underline-offset: 3px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, text-decoration-color 0.15s;
    }
    .tlink:hover { color: var(--link-hover); text-decoration-color: var(--link-hover); }
    .tlink.tlink--read { color: #999; text-decoration-color: rgba(153,153,153,0.35); }
    .tlink.tlink--read:hover { color: #555; text-decoration-color: rgba(85,85,85,0.4); }

    .hidden-map {
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.5;
      color: #faf9f7;
      text-align: center;
      margin-top: 2rem;
    }
    .hidden-map a { color: #faf9f7; text-decoration: none; }
    .hidden-map a:hover { color: #faf9f7; }

    /* Preview pane */
    .preview {
      position: fixed; z-index: 1000;
      background: var(--preview-bg);
      border: 1px solid var(--preview-border);
      box-shadow: 0 6px 28px var(--preview-shadow);
      border-radius: 2px;
      width: 360px; max-height: 420px;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s ease;
    }
    .preview.visible { opacity: 1; pointer-events: auto; }

    .preview-header {
      padding: 0.8rem 1.1rem 0.65rem;
      border-bottom: 1px solid var(--preview-border);
      flex-shrink: 0;
    }
    .preview-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 0.25rem;
    }
    .preview-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1rem; font-weight: 500; color: #111; line-height: 1.35;
    }
    .preview-body {
      flex: 1; overflow-y: auto;
      padding: 0.9rem 1.1rem;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.9rem; line-height: 1.65; color: #333;
      mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
    }
    .preview-body:hover { mask-image: none; -webkit-mask-image: none; }
    .preview-body p { margin-bottom: 0.8em; }
    .preview-body p:last-child { margin-bottom: 0; }
    .preview-footer {
      padding: 0.6rem 1.1rem;
      border-top: 1px solid var(--preview-border);
      flex-shrink: 0;
    }
    .preview-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--link);
      text-decoration: none; border-bottom: 1px solid var(--underline);
      padding-bottom: 1px;
    }
    .preview-link:hover { color: var(--link-hover); }

    @media (max-width: 768px) {
      .top-nav { top: 1.2rem; right: 1.2rem; }
      main { padding: 2rem 1.2rem 4rem 1.2rem; }
      .preview {
        width: calc(100vw - 24px) !important;
        max-width: calc(100vw - 24px) !important;
        left: 12px !important; right: 12px !important;
        bottom: 12px !important; top: auto !important;
        max-height: 50vh !important; position: fixed !important;
      }
    }
  </style>
</head>
<body>

  <div class="top-nav">
  </div>

  <main>
    <div class="content">
      <p class="thesis-lead">Good reasoning is hard.</p>
      <p class="thesis-body">It&#8217;s harder when the <span class="tlink" data-key="public-language">medium</span> we think with has been <span class="tlink" data-key="engineered-language">shaped</span> by people with <span class="tlink" data-key="political-struggle">stakes</span> in what we <span class="tlink" data-key="shared-maps">conclude</span>.</p>

    </div>
  </main>

  <div class="preview" id="preview">
    <div class="preview-header">
      <div class="preview-label" id="preview-label"></div>
      <div class="preview-title" id="preview-title"></div>
    </div>
    <div class="preview-body" id="preview-body"></div>
    <div class="preview-footer">
      <a class="preview-link" id="preview-link" href="#">Read full page &#8594;</a>
    </div>
  </div>

  <script>
    document.documentElement.dataset.tooltipBound = '1';
    const cache = {};
    const preview = document.getElementById('preview');
    const previewLabel = document.getElementById('preview-label');
    const previewTitle = document.getElementById('preview-title');
    const previewBody = document.getElementById('preview-body');
    const previewLink = document.getElementById('preview-link');
    let hideTimeout = null;
    let activeTouch = null;

    async function fetchPage(key) {
      if (cache[key]) return cache[key];
      try {
        const res = await fetch('problem/' + key + '.html');
        if (!res.ok) throw new Error('fetch failed');
        const text = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const h1 = doc.querySelector('h1');
        const labelEl = doc.querySelector('.label, .breadcrumb');
        const paras = Array.from(doc.querySelectorAll('main p, .content p'))
          .filter(p => !p.classList.contains('thesis-lead') && !p.classList.contains('hidden-map'))
          .slice(0, 5);
        cache[key] = {
          label: labelEl ? labelEl.textContent.trim().split('→').pop().trim() : key,
          title: h1 ? h1.textContent.trim() : '',
          paragraphs: paras.map(p => p.textContent.trim()).filter(t => t.length > 10)
        };
      } catch(e) {
        cache[key] = { label: key, title: '', paragraphs: ['Loading...'] };
      }
      return cache[key];
    }

    function position(el) {
      const isMobile = window.innerWidth <= 768;
      if (isMobile) return;
      const rect = el.getBoundingClientRect();
      const m = 12, pw = 360;
      let top = rect.bottom + m, left = rect.left;
      if (left + pw > window.innerWidth - m) left = window.innerWidth - pw - m;
      if (left < m) left = m;
      const h = preview.offsetHeight || 200;
      if (top + h > window.innerHeight - m) top = rect.top - h - m;
      if (top < m) top = m;
      preview.style.top = top + 'px';
      preview.style.left = left + 'px';
    }

    async function show(el, key) {
      clearTimeout(hideTimeout);
      preview.classList.add('visible');
      previewLabel.textContent = '...';
      previewTitle.textContent = '';
      previewBody.innerHTML = '';
      previewLink.href = 'problem/' + key + '.html';
      position(el);
      const data = await fetchPage(key);
      previewLabel.textContent = data.label;
      previewTitle.textContent = data.title;
      previewBody.innerHTML = data.paragraphs.map(p => `<p>${p}</p>`).join('');
      previewBody.scrollTop = 0;
      position(el);
    }

    function hide() { hideTimeout = setTimeout(() => { preview.classList.remove('visible'); activeTouch = null; }, 220); }

    document.querySelectorAll('.tlink').forEach(el => {
      el.addEventListener('mouseenter', () => show(el, el.dataset.key));
      el.addEventListener('mouseleave', hide);
      el.addEventListener('click', () => { if (window.innerWidth > 768) window.location.href = 'problem/' + el.dataset.key + '.html'; });
      el.addEventListener('touchend', e => {
        e.preventDefault();
        if (activeTouch === el.dataset.key && preview.classList.contains('visible')) {
          window.location.href = 'problem/' + el.dataset.key + '.html';
        } else {
          activeTouch = el.dataset.key;
          show(el, el.dataset.key);
        }
      });
    });

    document.addEventListener('touchend', e => {
      if (!preview.contains(e.target) && !e.target.classList.contains('tlink')) hide();
    });

    preview.addEventListener('mouseenter', () => clearTimeout(hideTimeout));
    preview.addEventListener('mouseleave', hide);
  </script>

  <script>
    (function() {
      var ALL_PAGES = [
        'public-language','engineered-language','engineered-names','engineered-words',
        'engineered-concepts','shared-maps','social-reality','legitimacy',
        'interlocking-expectations','political-struggle','map-territory','map-is-territory',
        'material-social','concepts','denotation-connotation','examples-words','many-others'
      ];
      var read;
      try { read = new Set(JSON.parse(localStorage.getItem('ww_read') || '[]')); } catch(e) { read = new Set(); }
      document.querySelectorAll('.tlink').forEach(function(el) {
        if (read.has(el.dataset.key)) el.classList.add('tlink--read');
      });
    })();
  </script>

</body>
</html>
