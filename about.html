<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrongwater — About</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --text: #1a1a1a;
      --text-muted: #999;
      --link: #1a4a8a;
      --link-hover: #0d2e5c;
      --underline: rgba(26, 74, 138, 0.35);
    }

    html { font-size: 20px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      line-height: 1.7;
      min-height: 100vh;
    }

    .top-nav {
      position: fixed;
      top: 1.4rem;
      right: 2rem;
      z-index: 50;
    }

    .top-nav-item {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text-muted);
    }
    .top-nav-item:hover { color: var(--link); }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 4rem 2rem;
    }

    .content { max-width: 560px; width: 100%; }

    p {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 1.4em;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 4rem);
      padding: 0 2rem;
    }

    .footer p {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 0.3em;
      text-align: center;
    }

    .footer a {
      color: var(--text-muted);
      text-decoration-color: rgba(0,0,0,0.15);
    }
    .footer a:hover { color: var(--link); }

    @media (max-width: 768px) {
      .top-nav { top: 1.2rem; right: 1.2rem; }
      main { padding: 4rem 1.2rem 4rem 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="top-nav">
    <a class="top-nav-item" href="index.html">Back</a>
  </div>

  <main>
    <div class="content">
      <p>Wrongwater is an in-progress research wiki about the adversarial use of language and its effects on public discourse and private reasoning.</p>
    </div>
  </main>

  <div class="footer">
    <p>Made by <a href="https://x.com/nosilverv" target="_blank">@nosilverv</a>. This work was made possible by the generous support of KANRO | Vitalik Buterin.</p>
  </div>

</body>
</html>
